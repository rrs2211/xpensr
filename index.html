<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>XpensR by RB — Smart Expense Management</title>
    <meta name="description" content="XpensR by RB — AI-powered expense management for modern teams. Submit claims, approvals, trip settlements — all in one place." />
    <meta name="keywords" content="expense management, expense claims, travel reimbursement, invoice OCR, GST, Tally export" />
    <meta name="author" content="RB Finsol Private Limited" />

    <!-- PWA -->
    <meta name="theme-color" content="#0f1c09" />
    <meta name="color-scheme" content="light dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="XpensR" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Apple splash screens for common iOS sizes -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
          href="/pwa-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xpensr.in/" />
    <meta property="og:title" content="XpensR by RB — Smart Expense Management" />
    <meta property="og:description" content="AI-powered expense management for modern teams." />
    <meta property="og:image" content="https://xpensr.in/pwa-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="XpensR by RB" />
    <meta name="twitter:description" content="Smart expense management for modern teams." />
    <meta name="twitter:image" content="https://xpensr.in/pwa-512.png" />

    <!-- Preconnect to speed up first load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
